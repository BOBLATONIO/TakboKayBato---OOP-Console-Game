<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Takbo Kay Bato Banner</title>
  <desc id="desc">Colorful banner for the Takbo Kay Bato OOP terminal dice race game.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="45%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" rx="26" />

  <circle cx="112" cy="92" r="50" fill="#fde047" opacity="0.92" />
  <circle cx="1088" cy="330" r="74" fill="#22d3ee" opacity="0.2" />
  <circle cx="980" cy="85" r="36" fill="#f97316" opacity="0.35" />

  <g filter="url(#shadow)">
    <rect x="78" y="78" width="590" height="248" rx="22" fill="#0b1022" fill-opacity="0.58" stroke="#93c5fd" stroke-opacity="0.45" />
  </g>

  <text x="112" y="155" fill="#f8fafc" font-size="58" font-weight="800" font-family="Segoe UI, Arial, sans-serif" letter-spacing="1">TAKBO KAY BATO</text>
  <text x="113" y="206" fill="#e2e8f0" font-size="28" font-weight="500" font-family="Segoe UI, Arial, sans-serif">OOP Terminal Dice Race Game</text>

  <g transform="translate(114,242)">
    <rect width="244" height="54" rx="27" fill="url(#chip)" />
    <text x="122" y="35" text-anchor="middle" fill="#052e16" font-size="23" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Easy + Hard Mode</text>
  </g>

  <g transform="translate(378,242)">
    <rect width="244" height="54" rx="27" fill="#fef3c7" />
    <text x="122" y="35" text-anchor="middle" fill="#7c2d12" font-size="23" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Java</text>
  </g>

  <g transform="translate(820,120)">
    <rect x="0" y="0" width="288" height="186" rx="18" fill="#111827" fill-opacity="0.62" stroke="#93c5fd" stroke-opacity="0.4" />
    <text x="26" y="43" fill="#e5e7eb" font-size="23" font-weight="700" font-family="Consolas, Monaco, monospace">Dice Roll</text>
    <rect x="30" y="64" width="90" height="90" rx="12" fill="#f8fafc" />
    <circle cx="75" cy="108" r="8" fill="#111827" />
    <circle cx="52" cy="86" r="8" fill="#111827" />
    <circle cx="98" cy="86" r="8" fill="#111827" />
    <circle cx="52" cy="130" r="8" fill="#111827" />
    <circle cx="98" cy="130" r="8" fill="#111827" />
    <text x="142" y="94" fill="#fcd34d" font-size="20" font-weight="700" font-family="Consolas, Monaco, monospace">Bato tile?</text>
    <text x="142" y="126" fill="#67e8f9" font-size="19" font-weight="700" font-family="Consolas, Monaco, monospace">Move back!</text>
  </g>
</svg>